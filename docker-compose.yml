services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - jr_net
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jr_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: jr_root_2026
      MYSQL_DATABASE: jr_developer
      MYSQL_USER: jr_developer
      MYSQL_PASSWORD: jr_pass_2026
    volumes:
      - jr_mysql_data:/var/lib/mysql
    networks:
      - jr_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - jr_redis_data:/data
    networks:
      - jr_net

networks:
  jr_net:
    driver: bridge

volumes:
  jr_mysql_data:
  jr_redis_data:
