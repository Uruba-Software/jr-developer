services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - jr_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - jr_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jr_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-jr_root_2026}
      MYSQL_DATABASE: ${DB_DATABASE:-jr_developer}
      MYSQL_USER: ${DB_USERNAME:-jr_developer}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jr_pass_2026}
    volumes:
      - jr_mysql_data:/var/lib/mysql
    networks:
      - jr_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-jr_root_2026}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - jr_redis_data:/data
    networks:
      - jr_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  jr_net:
    driver: bridge

volumes:
  jr_mysql_data:
  jr_redis_data:
